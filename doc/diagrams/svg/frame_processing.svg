" points="263.5,558.4844,267.5,568.4844,271.5,558.4844,267.5,562.4844" style="stroke: #5A7088; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacingAndGlyphs" textLength="46" x="267.5" y="554.8901">S-frame</text><line style="stroke: #5A7088; stroke-width: 1.5;" x1="267.5" x2="267.5" y1="630.3906" y2="770.3594"/><polygon fill="#5A7088" points="263.5,760.3594,267.5,770.3594,271.5,760.3594,267.5,764.3594" style="stroke: #5A7088; stroke-width: 1.0;"/><line style="stroke: #5A7088; stroke-width: 1.5;" x1="347.5" x2="347.5" y1="501.6797" y2="521.6797"/><polygon fill="#5A7088" points="343.5,511.6797,347.5,521.6797,351.5,511.6797,347.5,515.6797" style="stroke: #5A7088; stroke-width: 1.0;"/><line style="stroke: #5A7088; stroke-width: 1.5;" x1="347.5" x2="347.5" y1="782.3594" y2="802.3594"/><polygon fill="#5A7088" points="343.5,792.3594,347.5,802.3594,351.5,792.3594,347.5,796.3594" style="stroke: #5A7088; stroke-width: 1.0;"/><line style="stroke: #5A7088; stroke-width: 1.5;" x1="347.5" x2="347.5" y1="850.2969" y2="870.2969"/><polygon fill="#5A7088" points="343.5,860.2969,347.5,870.2969,351.5,860.2969,347.5,864.2969" style="stroke: #5A7088; stroke-width: 1.0;"/><!--MD5=[e86919972d7979c3152526d96daccb22]
@startuml
skinparam backgroundColor transparent
skinparam shadowing false
skinparam ArrowColor #5a7088
skinparam ActivityBorderColor #4d6a86
skinparam ActivityBackgroundColor #f7fbff
skinparam ActivityFontColor #1f2f3d
skinparam ActivityDiamondBorderColor #4d6a86
skinparam ActivityDiamondBackgroundColor #f7fbff
skinparam ActivityDiamondFontColor #1f2f3d

start
:Receive Frame;

if (Validate FCS) then (OK)
else (Error)
  :Discard\n(FCS error);
  stop
endif

if (Parse Address) then (OK)
else (Not ours)
  :Discard\n(not for us);
  stop
endif

:Parse Control;

switch (Frame type?)
case (U-frame)
  :Handle U-frame\nSNRM / UA / DISC / DM;
case (S-frame)
  :Handle S-frame\nRR / RNR / REJ\nUpdate V(A), process N(R);
case (I-frame)
  if (N(S) == V(R)?) then (Yes)
    :Accept\nV(R)++, deliver data;
  else (No)
    :Reject or discard\n(sequence error);
  endif
  :Process N(R) ACK\nUpdate V(A), slide window;
endswitch

:Update timers,\nwindow, state;

stop
@enduml

